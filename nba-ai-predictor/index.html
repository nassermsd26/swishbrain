<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swishbrain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #f3f4f6;
        font-family: 'Inter', sans-serif;
      }
      /* Custom NBA Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #1D428A; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #C8102E; 
      }
      @keyframes bounce-basketball {
        0%, 100% {
          transform: translate(-50%, 0) scale(1);
        }
        50% {
          transform: translate(-50%, -180px) scale(0.9);
        }
      }
      .animate-bounce-basketball {
        animation: bounce-basketball 1.5s ease-in-out infinite;
      }
      
      /* Animation de défilement automatique pour les scores */
      @keyframes scroll-up {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-50%);
        }
      }

      .animate-scroll-up {
        animation: scroll-up 30s linear infinite;
      }

      .animate-scroll-up:hover {
        animation-play-state: paused;
      }

      /* Scrollbar personnalisée style Facebook */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(155, 155, 155, 0.5);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(155, 155, 155, 0.7);
      }
    </style>
